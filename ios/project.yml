name: O2OChat
options:
  bundleId: com.o2ochat
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: O2OChat/Resources/Info.plist
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES

targets:
  O2OChat:
    type: application
    platform: iOS
    sources:
      - path: O2OChat
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.o2ochat
        INFOPLIST_FILE: O2OChat/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: ""
    info:
      path: O2OChat/Resources/Info.plist
      properties:
        CFBundleDisplayName: O2OChat
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        NSCameraUsageDescription: "O2OChat needs camera access for video calls"
        NSMicrophoneUsageDescription: "O2OChat needs microphone access for voice calls"
        NSPhotoLibraryUsageDescription: "O2OChat needs photo library access to send images"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
